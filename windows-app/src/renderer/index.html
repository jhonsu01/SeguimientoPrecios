<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:" />
  <title>Seguimiento Precios</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 100 100" aria-hidden="true">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0D9488" />
            <stop offset="1" stop-color="#4F46E5" />
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#g)" />
        <g fill="#F5F7FA">
          <rect x="26" y="55" width="9" height="18" rx="3" />
          <rect x="41" y="45" width="9" height="28" rx="3" />
          <rect x="56" y="34" width="9" height="39" rx="3" />
          <rect x="71" y="24" width="9" height="49" rx="3" />
        </g>
        <polyline points="30,52 45,42 60,31 75,21" fill="none" stroke="#34D399"
                  stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <div>
        <div class="brand-title">Seguimiento de Precios</div>
        <div class="brand-sub">Tu control de gastos inteligente</div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="dashboard">Inicio</button>
      <button class="tab" data-view="productos">Productos</button>
      <button class="tab" data-view="alacena">Alacena</button>
      <button class="tab" data-view="graficos">Graficos</button>
      <button class="tab" data-view="ajustes">Ajustes</button>
    </nav>
  </header>

  <main id="content"></main>

  <div id="modal-overlay" class="overlay hidden">
    <div id="modal" class="modal"></div>
  </div>

  <div id="scan-overlay" class="overlay hidden">
    <div id="scan-modal" class="modal"></div>
  </div>

  <div id="lock-screen" class="lock hidden"></div>

  <script src="vendor/zxing.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
