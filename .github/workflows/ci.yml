name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    name: Android (APK debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma y build-tools
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true

      - name: Cache de Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compilar APK de debug
        working-directory: android-app
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Subir artefacto APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  windows:
    name: Windows (empaquetado)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: windows-app
        run: npm install

      - name: Empaquetar app (verificacion, sin instalador)
        working-directory: windows-app
        run: npx electron-builder --win dir --publish never
