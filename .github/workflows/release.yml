name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ej: v0.1.0)'
        required: true

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  android:
    name: APK firmado
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma y build-tools
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true

      - name: Cache de Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Preparar keystore de firma
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "keystore=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
            echo "Keystore preparado."
          else
            echo "Sin KEYSTORE_BASE64: se firmara con la clave de debug."
          fi

      - name: Compilar APK de release
        working-directory: android-app
        env:
          KEYSTORE_PATH: ${{ steps.signing.outputs.keystore }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          VERSION="${TAG#v}"
          ./gradlew --no-daemon assembleRelease \
            -PappVersionName="$VERSION" \
            -PappVersionCode="${GITHUB_RUN_NUMBER}"

      - name: Renombrar APK con el tag
        run: |
          cp android-app/app/build/outputs/apk/release/app-release.apk "SeguimientoPrecios-${TAG}.apk"
          ls -la SeguimientoPrecios-*.apk

      - name: Subir artefacto APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: SeguimientoPrecios-*.apk
          if-no-files-found: error

  windows:
    name: Instalador MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ajustar version desde el tag
        working-directory: windows-app
        shell: pwsh
        run: |
          $v = "${{ env.TAG }}".TrimStart('v')
          npm version $v --no-git-tag-version --allow-same-version

      - name: Instalar dependencias
        working-directory: windows-app
        run: npm install

      - name: Construir MSI
        working-directory: windows-app
        run: npx electron-builder --win --publish never

      - name: Renombrar MSI con el tag
        shell: pwsh
        run: |
          $tag = "${{ env.TAG }}"
          $msi = Get-ChildItem windows-app/dist/*.msi | Select-Object -First 1
          Copy-Item $msi.FullName "SeguimientoPrecios-$tag.msi"
          Get-ChildItem SeguimientoPrecios-*.msi

      - name: Subir artefacto MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi-release
          path: SeguimientoPrecios-*.msi
          if-no-files-found: error

  publicar:
    name: Publicar release (solo la ultima)
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar binarios
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Gestionar releases (conservar solo la ultima) y publicar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Tag actual: $TAG"
          # 1) Borrar releases anteriores (y sus tags), conservando solo el actual.
          for t in $(gh release list --repo "$GITHUB_REPOSITORY" --json tagName -q '.[].tagName'); do
            if [ "$t" != "$TAG" ]; then
              echo "Borrando release anterior: $t"
              gh release delete "$t" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            fi
          done
          # 2) Recrear (o crear) la release del tag actual con los binarios.
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes || true
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "Seguimiento de Precios $TAG" \
            --notes "Release automatica $TAG. Binarios: APK (Android) y MSI (Windows). Cada version conserva solo la ultima release." \
            dist/SeguimientoPrecios-*.apk \
            dist/SeguimientoPrecios-*.msi
          echo "Release $TAG publicada."
